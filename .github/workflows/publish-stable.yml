name: Publish Stable

on:
  push:
    branches: [master]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  publish:
    permissions:
      contents: write
    uses: nano-step/shared-workflows/.github/workflows/publish-stable.yml@v1
    with:
      package-name: "@nano-step/skill-manager"
    secrets:
      NPM_TOKEN: ${{ secrets.NPM_TOKEN }}
